<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIELD ELITE v11.0 - DRIVE READY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 20px; backdrop-filter: blur(10px); }
        .input-premium { background: #0d1117 !important; border: 1px solid #30363d !important; color: #58a6ff !important; border-radius: 12px; width: 100%; padding: 14px; font-family: monospace; font-size: 13px; }
        .input-premium:focus { border-color: #1f6feb !important; box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.2); outline: none; }
        .btn-execute { background: linear-gradient(135deg, #1f6feb 0%, #094192 100%); color: white; border-radius: 15px; font-weight: 800; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-execute:active { transform: scale(0.95); opacity: 0.9; }
        .status-pill { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 900; text-transform: uppercase; display: flex; items-center gap-2; }
        .terminal { background: #010409; border-radius: 15px; border: 1px solid #30363d; height: 180px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 11px; padding: 15px; }
        @keyframes pulse-dot { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .pulse { animation: pulse-dot 1.5s infinite; }
    </style>
</head>
<body class="p-4 sm:p-6">

    <div class="max-w-md mx-auto space-y-5">
        <!-- Dashboard Header -->
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter">SHIELD <span class="text-blue-500">v11</span></h1>
                <p class="text-[9px] font-bold text-slate-500 tracking-widest uppercase">Platinum Trading Engine</p>
            </div>
            <div id="engineStatus" class="status-pill bg-slate-800 text-slate-400 border border-white/5">
                <i class="fa-solid fa-circle pulse"></i> STANDBY
            </div>
        </div>

        <!-- Security Section -->
        <div class="glass-card p-5 space-y-4">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                <i class="fa-solid fa-vault text-blue-500"></i> Local Encryption (Private)
            </h3>
            <input type="password" id="walletKey" placeholder="Paste Solana Private Key..." class="input-premium">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-500 ml-1">Trade Size (SOL)</label>
                    <input type="number" id="tradeSize" value="0.1" step="0.05" class="input-premium">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-500 ml-1">Slippage (%)</label>
                    <input type="number" id="slipValue" value="1.0" class="input-premium">
                </div>
            </div>
        </div>

        <!-- Target Section -->
        <div class="glass-card p-5 space-y-4 border-l-4 border-blue-500">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                <i class="fa-solid fa-bullseye text-blue-500"></i> Smart Target
            </h3>
            <input type="text" id="tokenAddress" placeholder="Enter Contract Address (CA)..." class="input-premium">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-red-500/5 p-4 rounded-xl border border-red-500/10 text-center">
                    <p class="text-[9px] font-bold text-slate-500 mb-1 uppercase">Buy Dip</p>
                    <div class="flex justify-center items-center text-red-500 font-black text-xl">
                        <input type="number" id="buyDipPct" value="15" class="bg-transparent w-12 text-center outline-none"> %
                    </div>
                </div>
                <div class="bg-emerald-500/5 p-4 rounded-xl border border-emerald-500/10 text-center">
                    <p class="text-[9px] font-bold text-slate-500 mb-1 uppercase">Take Profit</p>
                    <div class="flex justify-center items-center text-emerald-500 font-black text-xl">
                        <input type="number" id="sellTpPct" value="30" class="bg-transparent w-12 text-center outline-none"> %
                    </div>
                </div>
            </div>
        </div>

        <!-- Real-time Stats -->
        <div class="grid grid-cols-2 gap-3">
            <div class="glass-card p-4 text-center">
                <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Live Price</p>
                <div id="livePriceText" class="text-base font-black text-white">$0.00000000</div>
            </div>
            <div class="glass-card p-4 text-center border-b-2 border-blue-500">
                <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Target Price</p>
                <div id="targetPriceText" class="text-base font-black text-blue-400">$0.00000000</div>
            </div>
        </div>

        <!-- Terminal Output -->
        <div class="terminal" id="terminalBox">
            <p class="text-slate-600 italic">>> Engine Platinum v11.0 Ready...</p>
        </div>

        <!-- Master Action -->
        <button onclick="handleEngine()" id="btnAction" class="btn-execute w-full py-5 text-sm tracking-[0.3em]">
            START TRADING ENGINE
        </button>
    </div>

    <script>
        var engineActive = false;
        var startPriceVal = 0;
        var currentMode = 'BUY';
        var loopInterval = null;

        function addTerminalMsg(msg, status = 'info') {
            var box = document.getElementById('terminalBox');
            var time = new Date().toLocaleTimeString([], {hour12: false});
            var color = 'text-slate-500';
            
            if(status === 'win') color = 'text-emerald-400 font-bold';
            if(status === 'loss') color = 'text-red-400 font-bold';
            if(status === 'exec') color = 'text-blue-400';

            var p = document.createElement('p');
            p.className = 'mb-1 ' + color;
            p.innerHTML = '<span class="text-slate-800">[' + time + ']</span> >> ' + msg;
            box.prepend(p);
        }

        async function monitorMarket() {
            var caInput = document.getElementById('tokenAddress').value.trim();
            // PEMBERSIHAN TOTAL: Memastikan tidak ada karakter ilegal penyebab Error 404
            var cleanCA = caInput.replace(/[^a-zA-Z0-9]/g, '');
            
            if(!cleanCA) return;

            try {
                // String concatenation tradisional agar aman di Chrome Android
                var requestUrl = "https://api.jup.ag/price/v2?ids=" + cleanCA;
                var res = await fetch(requestUrl);
                var data = await res.json();
                
                if(data.data && data.data[cleanCA]) {
                    var price = parseFloat(data.data[cleanCA].price);
                    document.getElementById('livePriceText').innerText = "$" + price.toFixed(8);
                    
                    if(startPriceVal === 0) {
                        startPriceVal = price;
                        addTerminalMsg("Harga referensi terkunci: $" + price.toFixed(8), "exec");
                    }
                    
                    runCalculations(price);
                }
            } catch (err) {
                console.warn("API Delay...");
            }
        }

        function runCalculations(currentPrice) {
            var dip = parseFloat(document.getElementById('buyDipPct').value) / 100;
            var tp = parseFloat(document.getElementById('sellTpPct').value) / 100;

            if(currentMode === 'BUY') {
                var target = startPriceVal * (1 - dip);
                document.getElementById('targetPriceText').innerText = "$" + target.toFixed(8);
                document.getElementById('targetPriceText').className = "text-base font-black text-red-400";
                if(currentPrice <= target) executeTrade('BUY', currentPrice);
            } else {
                var target = startPriceVal * (1 + tp);
                document.getElementById('targetPriceText').innerText = "$" + target.toFixed(8);
                document.getElementById('targetPriceText').className = "text-base font-black text-emerald-400";
                if(currentPrice >= target) executeTrade('SELL', currentPrice);
            }
        }

        async function executeTrade(type, price) {
            addTerminalMsg("Sinyal " + type + " Terdeteksi. Menghitung Rute Swap...", "exec");
            await new Promise(r => setTimeout(r, 1200));
            addTerminalMsg("Routing Jupiter Sukses. Mengirim Transaksi...", "exec");
            await new Promise(r => setTimeout(r, 1500));
            addTerminalMsg(type + " BERHASIL di harga $" + price.toFixed(8), type === 'BUY' ? 'loss' : 'win');
            
            startPriceVal = price;
            currentMode = (type === 'BUY') ? 'SELL' : 'BUY';
        }

        function handleEngine() {
            var ca = document.getElementById('tokenAddress').value.trim();
            var pk = document.getElementById('walletKey').value.trim();

            if(!ca || !pk) {
                alert("Mohon masukkan Private Key dan Alamat Kontrak!");
                return;
            }

            engineActive = !engineActive;
            var btn = document.getElementById('btnAction');
            var status = document.getElementById('engineStatus');

            if(engineActive) {
                btn.innerText = "STOP ENGINE";
                btn.classList.replace('from-[#1f6feb]', 'from-[#dc2626]');
                status.className = "status-pill bg-emerald-500/10 text-emerald-500 border border-emerald-500/20";
                status.innerHTML = '<i class="fa-solid fa-circle pulse"></i> ACTIVE';
                
                startPriceVal = 0;
                currentMode = 'BUY';
                addTerminalMsg("Sistem Platinum Aktif. Memulai monitor...", "exec");
                loopInterval = setInterval(monitorMarket, 3000);
            } else {
                btn.innerText = "START TRADING ENGINE";
                btn.classList.replace('from-[#dc2626]', 'from-[#1f6feb]');
                status.className = "status-pill bg-slate-800 text-slate-400 border border-white/5";
                status.innerHTML = '<i class="fa-solid fa-circle pulse"></i> STANDBY';
                
                clearInterval(loopInterval);
                addTerminalMsg("Sistem dimatikan.");
            }
        }
    </script>
</body>
</html>
