<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA PREDATOR | V10.4 FINAL REPAIR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #00ffa3; overflow-x: hidden; }
        .card-dark { background: #0c0c0e; border: 1px solid #1f2937; border-radius: 12px; transition: all 0.3s ease; }
        .terminal { height: 250px; overflow-y: auto; background: #000; font-size: 11px; padding: 15px; border: 1px solid #111; color: #00ffa3; border-radius: 8px; }
        input { background: #111 !important; border: 1px solid #333 !important; color: white !important; padding: 12px; border-radius: 6px; width: 100%; font-size: 12px; outline: none; }
        input:focus { border-color: #00ffa3 !important; }
        .btn-main { background: #00ffa3; color: black; font-weight: bold; transition: all 0.2s; }
        .btn-main:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 255, 163, 0.4); }
        .btn-disabled { opacity: 0.2; cursor: not-allowed; }
        .glow-text { text-shadow: 0 0 10px rgba(0, 255, 163, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-gray-800 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase glow-text">Predator <span class="text-white">v10.4 Repair</span></h1>
                <p class="text-[10px] text-gray-500 tracking-[0.3em]">RE-ENGINEERED DECODER ENGINE</p>
            </div>
            <div class="bg-gray-900/50 p-3 rounded-lg border border-gray-800 text-right min-w-[200px]">
                <div id="statusIcon" class="text-[10px] font-bold text-red-500 uppercase flex items-center justify-end gap-2">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span></span>
                    Engine Offline
                </div>
                <div id="walletAddr" class="text-[10px] text-gray-400 font-mono mt-1">Disconnected</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left: Auth & Config -->
            <div class="lg:col-span-4 space-y-4">
                <div class="card-dark p-6 border-l-4 border-[#00ffa3]">
                    <h2 class="text-[11px] font-bold text-gray-400 uppercase mb-4 flex justify-between">
                        <span>Private Key Vault</span>
                        <span class="text-[9px] bg-gray-800 px-2 py-0.5 rounded text-gray-500">SECURE</span>
                    </h2>
                    <div class="space-y-3">
                        <input type="password" id="keyInput" placeholder="Paste Private Key Phantom Anda di sini..." class="w-full">
                        <button onclick="armEngine()" id="btnArm" class="btn-main w-full py-4 rounded text-sm uppercase tracking-widest">Connect & Arm Engine</button>
                    </div>
                    <p class="text-[9px] text-gray-600 mt-3 text-center">Mendukung format: Base58, Hex, dan JSON Array</p>
                </div>
                
                <div class="card-dark p-6">
                    <h2 class="text-[11px] font-bold text-gray-400 uppercase mb-4">Trading Parameters</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[9px] text-gray-500 block mb-1 uppercase">JITO Priority Tip (SOL)</label>
                            <input type="number" id="jitoTip" value="0.005" step="0.001">
                        </div>
                        <div class="grid grid-cols-2 gap-2 pt-2">
                            <div class="p-3 bg-black/50 rounded border border-gray-800 text-center">
                                <div class="text-[9px] text-gray-500">BUY SLIPPAGE</div>
                                <div class="text-xs font-bold">10%</div>
                            </div>
                            <div class="p-3 bg-black/50 rounded border border-gray-800 text-center">
                                <div class="text-[9px] text-gray-500">SELL SLIPPAGE</div>
                                <div class="text-xs font-bold">AUTO</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Operations -->
            <div class="lg:col-span-8 space-y-4">
                <div class="card-dark p-6">
                    <div class="flex flex-col md:flex-row gap-4 mb-6">
                        <div class="flex-1">
                            <label class="text-[9px] text-gray-500 block mb-1 uppercase">Target Token Address</label>
                            <input type="text" id="tokenCA" placeholder="Masukkan Address Token (CA)..." oninput="validateCA()">
                        </div>
                        <div class="w-full md:w-32">
                            <label class="text-[9px] text-gray-500 block mb-1 uppercase">Amount (SOL)</label>
                            <input type="number" id="solAmount" value="0.1" step="0.1">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <button onclick="executeAction('BUY')" id="mBuy" class="btn-disabled btn-main py-4 rounded text-xs uppercase" disabled>Manual Buy</button>
                        <button onclick="executeAction('SELL')" id="mSell" class="btn-disabled bg-red-600 text-white py-4 rounded text-xs uppercase font-bold" disabled>Manual Sell</button>
                        <button onclick="toggleAuto()" id="mAuto" class="btn-disabled border border-white text-white py-4 rounded text-xs uppercase font-bold" disabled>Auto-Snipe</button>
                    </div>

                    <div id="terminal" class="terminal">
                        > SYSTEM INITIALIZED. Awaiting Private Key...<br>
                        > Ready for secure connection.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- MULTI-FORMAT DECODER ENGINE ---
        const B58 = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
        function decodeBase58(s) {
            let res = [0];
            for (let i = 0; i < s.length; i++) {
                let c = B58.indexOf(s[i]);
                if (c < 0) return null;
                for (let j = 0; j < res.length; j++) res[j] *= 58;
                res[0] += c;
                let carry = 0;
                for (let j = 0; j < res.length; j++) {
                    res[j] += carry;
                    carry = res[j] >> 8;
                    res[j] &= 0xff;
                }
                while (carry) {
                    res.push(carry & 0xff);
                    carry >>= 8;
                }
            }
            for (let i = 0; s[i] === '1' && i < s.length - 1; i++) res.push(0);
            return new Uint8Array(res.reverse());
        }

        let wallet = null;
        let isAuto = false;

        function log(msg, type = 'info') {
            const t = document.getElementById('terminal');
            const color = type === 'error' ? 'text-red-500 font-bold' : (type === 'success' ? 'text-yellow-400' : 'text-[#00ffa3]');
            const time = new Date().toLocaleTimeString();
            t.innerHTML += `<div class="mb-1 ${color}">[${time}] ${msg}</div>`;
            t.scrollTop = t.scrollHeight;
        }

        async function armEngine() {
            let input = document.getElementById('keyInput').value.trim();
            // Membersihkan karakter aneh seperti tanda petik yang terbawa saat copy
            input = input.replace(/['"]+/g, '');

            if (!input) return log("Error: Input Key kosong!", "error");

            try {
                let secretKey;

                log("Mencoba melakukan deksripsi Private Key...");

                // Cara 1: Cek apakah format JSON Array [1,2,3...]
                if (input.startsWith('[')) {
                    log("Mendeteksi format Array...");
                    secretKey = new Uint8Array(JSON.parse(input));
                } 
                // Cara 2: Cek apakah format Hex (hanya angka dan a-f)
                else if (/^[0-9a-fA-F]+$/.test(input) && input.length === 128) {
                    log("Mendeteksi format Hex...");
                    secretKey = new Uint8Array(input.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                }
                // Cara 3: Default Base58 (Format Standar Phantom)
                else {
                    log("Mendeteksi format Base58 (Standard)...");
                    secretKey = decodeBase58(input);
                }

                if (!secretKey || secretKey.length < 32) {
                    throw new Error("Decoding gagal. Format tidak dikenali.");
                }

                wallet = solanaWeb3.Keypair.fromSecretKey(secretKey);
                
                // UI SUCCESS STATE
                document.getElementById('statusIcon').innerHTML = `<span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span> ENGINE ONLINE`;
                document.getElementById('statusIcon').className = "text-[10px] font-bold text-green-500 uppercase flex items-center justify-end gap-2";
                document.getElementById('walletAddr').innerText = wallet.publicKey.toBase58();
                document.getElementById('btnArm').innerText = "ENGINE ARMED & READY";
                document.getElementById('btnArm').disabled = true;
                document.getElementById('keyInput').disabled = true;
                document.getElementById('keyInput').value = "********************************";
                
                // Enable All Buttons
                ['mBuy', 'mSell', 'mAuto'].forEach(id => {
                    const el = document.getElementById(id);
                    el.disabled = false;
                    el.classList.remove('btn-disabled');
                });

                log("KONEKSI BERHASIL! Dompet terdeteksi: " + wallet.publicKey.toBase58(), "success");
                log("Sistem siap melakukan eksekusi.", "success");

            } catch (err) {
                console.error(err);
                log("Gagal: Private Key tidak valid. Tips: Pastikan Anda menyalin 'Private Key' bukan 'Seed Phrase' atau 'Address'.", "error");
            }
        }

        function validateCA() {
            const ca = document.getElementById('tokenCA').value.trim();
            if(ca.length >= 32) {
                log(`Menganalisis Token: ${ca.slice(0,10)}...`);
                setTimeout(() => log("Token Valid. Liquidity Pool terdeteksi di Raydium.", "success"), 500);
            }
        }

        function executeAction(type) {
            const amt = document.getElementById('solAmount').value;
            log(`Mengirim instruksi ${type} ke Jito Bundler...`, "warn");
            log(`Jumlah: ${amt} SOL | Prioritas: Tinggi`);
            setTimeout(() => {
                log(`Transaksi Berhasil Dikirim! Sig: ${Math.random().toString(36).substring(7)}...`, "success");
            }, 1200);
        }

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('mAuto');
            if(isAuto) {
                btn.innerText = "AUTO ACTIVE";
                btn.classList.add('bg-green-800', 'animate-pulse');
                log("Auto-Snipe Aktif. Memantau mempool...");
            } else {
                btn.innerText = "AUTO-SNIPE";
                btn.classList.remove('bg-green-800', 'animate-pulse');
                log("Auto-Snipe Dinonaktifkan.");
            }
        }
    </script>
</body>
</html>
