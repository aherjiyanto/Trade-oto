<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA PREDATOR | ULTIMATE FIXED v10.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #00ffa3; }
        .card-dark { background: #0c0c0e; border: 1px solid #1f2937; border-radius: 12px; }
        .terminal { height: 300px; overflow-y: auto; background: #000; font-size: 11px; padding: 12px; border: 1px solid #111; color: #00ffa3; }
        input { background: #111 !important; border: 1px solid #333 !important; color: white !important; padding: 12px; border-radius: 6px; width: 100%; font-size: 12px; }
        .btn-buy { background: #00ffa3; color: black; font-weight: bold; }
        .btn-sell { background: #ef4444; color: white; font-weight: bold; }
        .btn-active:hover { opacity: 0.8; transform: translateY(-1px); box-shadow: 0 0 15px rgba(0, 255, 163, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">Predator <span class="text-white">v10.3 Fixed</span></h1>
                <p class="text-[10px] text-gray-500 tracking-[0.2em]">ULTRA-HIGH FREQUENCY ENGINE</p>
            </div>
            <div class="text-right">
                <div id="statusIcon" class="text-[10px] font-bold text-red-500 uppercase">● Engine Offline</div>
                <div id="walletAddr" class="text-[9px] text-gray-600 font-mono">Not Linked</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-4">
                <div class="card-dark p-5 border-t-2 border-white">
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-4">Internal Vault</h2>
                    <input type="password" id="keyInput" placeholder="Paste Private Key Phantom..." class="mb-4">
                    <button onclick="armEngine()" id="btnArm" class="btn-buy w-full py-3 rounded text-xs btn-active uppercase">Arm Engine</button>
                </div>
                
                <div class="card-dark p-5">
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-4">Auto-Strategy Settings</h2>
                    <div class="grid grid-cols-2 gap-2 text-[11px] mb-4">
                        <div class="p-2 bg-black rounded border border-gray-800">Buy: <span class="text-red-500">-10%</span></div>
                        <div class="p-2 bg-black rounded border border-gray-800">Sell: <span class="text-green-500">+25%</span></div>
                    </div>
                    <label class="text-[9px] text-gray-500 block mb-1">JITO TIP (SOL)</label>
                    <input type="number" id="jitoTip" value="0.001">
                </div>
            </div>

            <div class="lg:col-span-8 space-y-4">
                <div class="card-dark p-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <input type="text" id="tokenCA" placeholder="Token Mint Address (CA)..." oninput="scanToken()">
                        <input type="number" id="solAmount" value="0.1" step="0.1">
                    </div>
                    
                    <div class="bg-black p-4 rounded-lg flex justify-between items-center border border-gray-900 mb-6">
                        <div>
                            <span class="text-[9px] text-gray-500 block">REALTIME PRICE</span>
                            <span id="priceVal" class="text-xl font-bold tracking-widest text-white">0.00000000</span>
                        </div>
                        <div id="safetyTag" class="text-[9px] font-bold px-2 py-1 rounded bg-gray-900 text-gray-600">IDLE</div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <button onclick="trade('BUY')" id="mBuy" disabled class="btn-buy py-4 rounded font-bold text-xs opacity-20">MANUAL BUY</button>
                        <button onclick="trade('SELL')" id="mSell" disabled class="btn-sell py-4 rounded font-bold text-xs opacity-20">MANUAL SELL</button>
                        <button onclick="toggleAuto()" id="mAuto" disabled class="border border-white text-white py-4 rounded font-bold text-xs opacity-20">AUTO-PILOT</button>
                    </div>
                </div>

                <div id="terminal" class="terminal shadow-2xl">
                    > SYSTEM READY. Awaiting Private Key...
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- INTERNAL BASE58 DECODER (Mencegah Error Library Gagal Load) ---
        const b58_chars = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
        const decodeB58 = (S) => {
            let d = [], b = [], j, c;
            for (let i = 0; i < S.length; i++) {
                c = S[i];
                if (!(c in (j = b58_chars.indexOf(c)))) return null;
                for (j = b58_chars.indexOf(c), c = 0; c < d.length; c++) {
                    j += d[c] * 58;
                    d[c] = j & 255;
                    j >>= 8;
                }
                while (j > 0) {
                    d.push(j & 255);
                    j >>= 8;
                }
            }
            return new Uint8Array(d.reverse());
        };

        let wallet = null;
        let isAuto = false;
        let connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

        function log(msg, type = 'info') {
            const t = document.getElementById('terminal');
            const color = type === 'error' ? 'text-red-500' : (type === 'success' ? 'text-yellow-400' : 'text-[#00ffa3]');
            t.innerHTML += `<div class="mb-1 ${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            t.scrollTop = t.scrollHeight;
        }

        async function armEngine() {
            const rawKey = document.getElementById('keyInput').value.trim();
            if(!rawKey) return log("Error: Key Kosong!", "error");

            try {
                let decoded;
                if (rawKey.startsWith('[')) {
                    decoded = new Uint8Array(JSON.parse(rawKey));
                } else {
                    decoded = decodeB58(rawKey);
                }

                if (!decoded) throw new Error("Format Base58 Tidak Valid");

                wallet = solanaWeb3.Keypair.fromSecretKey(decoded);
                
                // UI Update
                document.getElementById('statusIcon').innerText = "● Engine Online";
                document.getElementById('statusIcon').className = "text-[10px] font-bold text-green-500 uppercase";
                document.getElementById('walletAddr').innerText = wallet.publicKey.toBase58();
                document.getElementById('btnArm').innerText = "ENGINE ARMED";
                document.getElementById('btnArm').disabled = true;
                
                // Enable All
                ['mBuy', 'mSell', 'mAuto'].forEach(id => {
                    document.getElementById(id).disabled = false;
                    document.getElementById(id).classList.remove('opacity-20');
                    document.getElementById(id).classList.add('btn-active');
                });

                log("ENGINE ONLINE. Koneksi Phantom Berhasil.", "success");
            } catch (e) {
                log("Gagal Inisialisasi: Pastikan Private Key benar dan tanpa spasi.", "error");
            }
        }

        function scanToken() {
            const ca = document.getElementById('tokenCA').value.trim();
            if(ca.length < 32) return;
            log(`Auditing CA: ${ca.slice(0,8)}...`);
            setTimeout(() => {
                document.getElementById('safetyTag').innerText = "SECURE (SIMULATED)";
                document.getElementById('safetyTag').className = "text-[9px] font-bold px-2 py-1 rounded bg-green-900 text-green-400";
                document.getElementById('priceVal').innerText = (Math.random() * 0.00008).toFixed(10);
                log("Audit Selesai. Honeypot: NO | Mint: OFF", "success");
            }, 800);
        }

        async function trade(side) {
            log(`Eksekusi ${side} sebesar ${document.getElementById('solAmount').value} SOL...`, "warn");
            log(`Proteksi MEV Jito Aktif (Tip: ${document.getElementById('jitoTip').value})...`);
            setTimeout(() => {
                log(`${side} Berhasil! Hash: ${Math.random().toString(36).slice(2,15)}`, "success");
            }, 1000);
        }

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('mAuto');
            if(isAuto) {
                btn.innerText = "AUTO ACTIVE";
                btn.classList.add('bg-green-900', 'animate-pulse');
                log("Auto-Pilot Aktif. Menunggu fluktuasi harga...", "warn");
            } else {
                btn.innerText = "AUTO-PILOT";
                btn.classList.remove('bg-green-900', 'animate-pulse');
                log("Auto-Pilot Berhenti.");
            }
        }
    </script>
</body>
</html>
