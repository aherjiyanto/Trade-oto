<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA PREDATOR | HYBRID ENGINE v10.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://bundle.run/bs58@5.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #00ffa3; }
        .card-dark { background: #0c0c0e; border: 1px solid #1f2937; border-radius: 12px; }
        .terminal { height: 280px; overflow-y: auto; background: #000; font-size: 11px; padding: 12px; border: 1px solid #111; color: #00ffa3; }
        input { background: #111 !important; border: 1px solid #333 !important; color: white !important; padding: 10px; border-radius: 6px; width: 100%; font-size: 12px; }
        input:focus { border-color: #00ffa3 !important; outline: none; }
        .btn-buy { background: #00ffa3; color: black; font-weight: bold; }
        .btn-sell { background: #ef4444; color: white; font-weight: bold; }
        .btn-auto { border: 1px solid #00ffa3; color: #00ffa3; font-weight: bold; }
        .btn-active:hover { opacity: 0.8; transform: translateY(-1px); box-shadow: 0 0 15px rgba(0, 255, 163, 0.3); }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter">PREDATOR <span class="text-white">HYBRID v10.2</span></h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">High-Frequency Trading & Auto-Strategy</p>
            </div>
            <div class="text-right">
                <div id="engineStatus" class="text-[10px] font-bold text-red-500 uppercase">
                    <span class="status-dot bg-red-500 animate-pulse"></span> Engine Offline
                </div>
                <div id="walletDisplay" class="text-[9px] text-gray-600 mt-1 font-mono">No Wallet Connected</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Sidebar: Config -->
            <div class="lg:col-span-4 space-y-6">
                <div class="card-dark p-5">
                    <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">1. Auth Vault</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[9px] text-gray-500 block mb-1">PRIVATE KEY (PHANTOM BASE58)</label>
                            <input type="password" id="privKeyInput" placeholder="Masukkan Key Anda...">
                        </div>
                        <button onclick="initializeEngine()" id="btnInit" class="btn-buy w-full py-3 rounded text-xs btn-active uppercase">Initialize Engine</button>
                    </div>
                </div>

                <div class="card-dark p-5">
                    <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">2. Strategy Params</h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[9px] text-gray-500 block mb-1">BUY ON DIP</label>
                                <input type="text" value="-10%" disabled class="text-center opacity-50">
                            </div>
                            <div>
                                <label class="text-[9px] text-gray-500 block mb-1">TAKE PROFIT</label>
                                <input type="text" value="+25%" disabled class="text-center opacity-50">
                            </div>
                        </div>
                        <div>
                            <label class="text-[9px] text-gray-500 block mb-1">JITO MEV TIP (SOL)</label>
                            <input type="number" id="jitoTip" value="0.001" step="0.001">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Panel -->
            <div class="lg:col-span-8 space-y-6">
                <div class="card-dark p-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="text-xs font-bold text-gray-400 block mb-2">TARGET TOKEN CONTRACT (CA)</label>
                            <input type="text" id="tokenCA" placeholder="Paste CA di sini..." oninput="handleCAChange()" class="font-mono">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 block mb-2">TRADE AMOUNT (SOL)</label>
                            <input type="number" id="tradeAmount" value="0.1" step="0.05">
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-8 bg-black/50 p-4 rounded-lg border border-gray-900">
                        <div>
                            <span class="text-[10px] text-gray-500 block uppercase">Current Price</span>
                            <span id="priceDisplay" class="text-2xl font-bold tracking-widest">0.00000000</span>
                        </div>
                        <div class="text-right">
                            <span id="auditStatus" class="text-[10px] bg-gray-800 px-3 py-1 rounded text-gray-400 font-bold italic">WAITING FOR CA</span>
                        </div>
                    </div>

                    <!-- CONTROL PANEL: MANUAL & AUTO -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <button onclick="executeTrade('BUY')" id="btnManualBuy" disabled class="btn-buy py-4 rounded-xl text-xs btn-active uppercase">Manual Buy</button>
                        <button onclick="executeTrade('SELL')" id="btnManualSell" disabled class="btn-sell py-4 rounded-xl text-xs btn-active uppercase">Manual Sell</button>
                        <button onclick="toggleAutoPilot()" id="btnAuto" disabled class="btn-auto py-4 rounded-xl text-xs btn-active uppercase">Auto-Pilot</button>
                    </div>
                </div>

                <!-- Logs -->
                <div class="card-dark p-4">
                    <div class="flex justify-between items-center mb-2 px-1">
                        <span class="text-[10px] font-bold text-gray-600 uppercase">Execution Logs</span>
                        <span id="latency" class="text-[9px] text-gray-700 font-mono italic">RPC: ---ms</span>
                    </div>
                    <div id="terminal" class="terminal font-mono">
                        [SYSTEM] PREDATOR ENGINE STANDBY. Masukkan Private Key Phantom untuk memulai.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let wallet = null;
        let isAutoActive = false;
        let basePrice = 0;
        const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

        function log(msg, type = 'info') {
            const t = document.getElementById('terminal');
            const color = type === 'error' ? 'text-red-500' : (type === 'success' ? 'text-yellow-300' : 'text-[#00ffa3]');
            t.innerHTML += `<div class="mb-1 ${color}"><span class="text-gray-600">[${new Date().toLocaleTimeString()}]</span> ${msg}</div>`;
            t.scrollTop = t.scrollHeight;
        }

        // --- CORE INITIALIZATION ---
        async function initializeEngine() {
            const input = document.getElementById('privKeyInput').value.trim();
            if(!input) return log("Error: Key tidak boleh kosong!", "error");

            try {
                let secretKey;
                // Handle format Array [1,2,3...] atau Base58 (Phantom)
                if (input.startsWith('[')) {
                    secretKey = new Uint8Array(JSON.parse(input));
                } else {
                    secretKey = bs58.decode(input);
                }

                wallet = solanaWeb3.Keypair.fromSecretKey(secretKey);
                
                // Update UI
                document.getElementById('engineStatus').innerHTML = `<span class="status-dot bg-green-500"></span> Engine Online`;
                document.getElementById('engineStatus').className = "text-[10px] font-bold text-green-500 uppercase";
                document.getElementById('walletDisplay').innerText = "Connected: " + wallet.publicKey.toBase58();
                document.getElementById('btnInit').innerText = "SYSTEM ARMED";
                document.getElementById('btnInit').disabled = true;
                
                // Enable Buttons
                document.getElementById('btnManualBuy').disabled = false;
                document.getElementById('btnManualSell').disabled = false;
                document.getElementById('btnAuto').disabled = false;

                log("ENGINE ONLINE. Private Key Terverifikasi.", "success");
                log(`Public Key: ${wallet.publicKey.toBase58()}`);
                checkLatency();
            } catch (e) {
                log("Gagal: Format Private Key salah. Pastikan Base58 dari Phantom.", "error");
            }
        }

        async function checkLatency() {
            const start = Date.now();
            await connection.getSlot();
            document.getElementById('latency').innerText = `RPC: ${Date.now() - start}ms`;
        }

        // --- TRADING LOGIC ---
        function handleCAChange() {
            const ca = document.getElementById('tokenCA').value;
            if(ca.length >= 32) {
                log(`Scanning Token: ${ca.slice(0,10)}...`);
                // Simulate Audit & Price
                document.getElementById('auditStatus').innerText = "SCANNING SAFETY...";
                setTimeout(() => {
                    basePrice = (Math.random() * 0.000045).toFixed(10);
                    document.getElementById('priceDisplay').innerText = basePrice;
                    document.getElementById('auditStatus').innerText = "SECURE (SIMULATED)";
                    document.getElementById('auditStatus').className = "text-[10px] bg-green-900 px-3 py-1 rounded text-green-400 font-bold italic";
                    log("Audit: No Honeypot detected. Liquidity Locked.", "success");
                }, 1200);
            }
        }

        async function executeTrade(side) {
            const ca = document.getElementById('tokenCA').value;
            const amount = document.getElementById('tradeAmount').value;
            const tip = document.getElementById('jitoTip').value;

            if(!ca) return log("Error: Masukkan CA Token!", "error");
            
            log(`[${side}] Inisialisasi Transaksi ${amount} SOL...`, "warn");
            log(`Mengirim via Jito Bundle (Tip: ${tip} SOL)...`);

            // Simulasi proses signing instant dengan Private Key (10/10 Speed)
            setTimeout(() => {
                log(`Transaksi ${side} BERHASIL. Hash: ${Math.random().toString(36).slice(2)}`, "success");
            }, 1000);
        }

        function toggleAutoPilot() {
            if(!isAutoActive) {
                isAutoActive = true;
                document.getElementById('btnAuto').innerText = "AUTO ACTIVE";
                document.getElementById('btnAuto').className = "btn-auto py-4 rounded-xl text-xs btn-active uppercase bg-green-900 text-white animate-pulse";
                log("Auto-Pilot Berjalan: Menunggu Buy (-10%) atau Sell (+25%)", "warn");
                startMonitoring();
            } else {
                isAutoActive = false;
                document.getElementById('btnAuto').innerText = "AUTO-PILOT";
                document.getElementById('btnAuto').className = "btn-auto py-4 rounded-xl text-xs btn-active uppercase";
                log("Auto-Pilot Dinonaktifkan.", "error");
            }
        }

        function startMonitoring() {
            const interval = setInterval(() => {
                if(!isAutoActive) { clearInterval(interval); return; }

                // Simulasi pergerakan harga pasar
                let currentPrice = parseFloat(document.getElementById('priceDisplay').innerText);
                let fluctuation = 1 + (Math.random() * 0.08 - 0.04);
                let newPrice = (currentPrice * fluctuation).toFixed(10);
                document.getElementById('priceDisplay').innerText = newPrice;

                let diff = ((newPrice - basePrice) / basePrice) * 100;

                if(diff <= -10) {
                    log(`Auto-Buy triggered at ${diff.toFixed(2)}%`, "success");
                    executeTrade('BUY');
                    toggleAutoPilot(); // Matikan auto setelah eksekusi
                } else if(diff >= 25) {
                    log(`Auto-Sell triggered at ${diff.toFixed(2)}%`, "success");
                    executeTrade('SELL');
                    toggleAutoPilot();
                }
            }, 2000);
        }
    </script>
</body>
</html>
