<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni-X Genesis Ultra v10.0 - Mobile Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            background-color: #010204; 
            color: #f1f5f9; 
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-card { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 1.5rem;
        }

        .btn-glow-green {
            background: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .btn-glow-gold {
            background: #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        /* Navigasi Mobile Bawah */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }

        .active-tab { color: #fbbf24; }

        .terminal-box {
            background: #000;
            border: 1px solid #1e293b;
            font-size: 10px;
            height: 180px;
        }

        /* Animasi */
        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        .status-dot { animation: pulse-dot 2s infinite; }
    </style>
</head>
<body class="pb-24">

    <!-- Mobile Header -->
    <header class="p-4 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#010204] z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center text-black font-black italic">X</div>
            <h1 class="text-lg font-bold tracking-tight">OMNI-X <span class="text-yellow-500">v10</span></h1>
        </div>
        <button id="mobileConnect" class="bg-yellow-500 text-black px-4 py-2 rounded-lg text-xs font-bold transition-all active:scale-95">
            CONNECT
        </button>
    </header>

    <div class="p-4 space-y-6">
        
        <!-- Wallet Status -->
        <div id="walletDisplay" class="hidden glass-card p-4 flex justify-between items-center border-l-4 border-green-500">
            <div>
                <p class="text-[10px] text-gray-500 mono uppercase">Wallet Active</p>
                <p id="addrText" class="text-xs font-bold mono">4hJz...9xK</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 mono uppercase">Balance</p>
                <p class="text-sm font-bold text-yellow-500">12.45 SOL</p>
            </div>
        </div>

        <!-- Target Input Section -->
        <section class="space-y-3">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Target Token (CA)</h2>
            <div class="flex gap-2">
                <input type="text" id="caInput" placeholder="Paste Contract Address..." class="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-4 py-4 text-sm outline-none focus:border-yellow-500 transition-all">
                <button id="btnAudit" class="bg-zinc-800 px-5 rounded-2xl border border-white/10 active:bg-zinc-700">
                    <i class="fas fa-shield-alt text-yellow-500"></i>
                </button>
            </div>
            
            <!-- Audit Result Card -->
            <div id="auditResult" class="hidden glass-card p-4 border border-yellow-500/20">
                <div class="flex justify-between items-center mb-3">
                    <span class="font-bold text-yellow-500 italic">$TARGET_TOKEN</span>
                    <span class="text-[9px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded font-bold">100% SAFE</span>
                </div>
                <div class="grid grid-cols-3 gap-2 text-[9px] mono uppercase text-center">
                    <div class="bg-black/40 p-2 rounded-lg"><span class="block text-gray-500">LP</span><span class="text-green-400">Locked</span></div>
                    <div class="bg-black/40 p-2 rounded-lg"><span class="block text-gray-500">Mint</span><span class="text-green-400">No</span></div>
                    <div class="bg-black/40 p-2 rounded-lg"><span class="block text-gray-500">Honey</span><span class="text-green-400">Passed</span></div>
                </div>
            </div>
        </section>

        <!-- Main Execution Module -->
        <section class="glass-card p-5 border-t-2 border-green-500">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-bold text-green-500 uppercase tracking-widest">Buy Execution</h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full status-dot"></span>
                    <span class="text-[10px] mono text-gray-500">MEV-SHIELD ON</span>
                </div>
            </div>
            
            <div class="space-y-4">
                <div class="relative">
                    <input type="number" id="solInput" value="0.1" class="w-full bg-black/50 border border-white/10 rounded-2xl py-5 px-6 text-2xl font-bold outline-none text-white focus:border-green-500 transition-all">
                    <span class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-500 font-bold">SOL</span>
                </div>
                
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setSol(0.1)" class="bg-zinc-900 border border-white/5 py-2 rounded-xl text-xs mono">0.1</button>
                    <button onclick="setSol(0.5)" class="bg-zinc-900 border border-white/5 py-2 rounded-xl text-xs mono">0.5</button>
                    <button onclick="setSol(1.0)" class="bg-zinc-900 border border-white/5 py-2 rounded-xl text-xs mono">1.0</button>
                    <button onclick="setSol('MAX')" class="bg-green-500/10 text-green-500 py-2 rounded-xl text-xs font-bold">MAX</button>
                </div>

                <button id="btnSnipe" class="w-full btn-glow-green text-black py-5 rounded-3xl font-black text-xl tracking-tighter italic active:scale-95 transition-all">
                    SNIPE NOW
                </button>
            </div>
        </section>

        <!-- Log Activity -->
        <section>
            <div class="flex justify-between px-1 mb-2">
                <span class="text-[10px] font-bold text-gray-500 uppercase">System Log</span>
                <span id="clearLog" class="text-[10px] text-blue-400 uppercase cursor-pointer">Clear</span>
            </div>
            <div id="terminal" class="terminal-box rounded-2xl p-4 overflow-y-auto mono custom-scroll space-y-1">
                <div class="text-yellow-500/70">> Omni-X Mobile v10 Ready.</div>
                <div class="text-gray-500">> Waiting for Phantom connection...</div>
            </div>
        </section>

    </div>

    <!-- Mobile Nav -->
    <div class="bottom-nav">
        <button class="active-tab flex flex-col items-center gap-1">
            <i class="fas fa-bolt text-lg"></i>
            <span class="text-[9px] font-bold uppercase">Sniper</span>
        </button>
        <button class="text-gray-500 flex flex-col items-center gap-1">
            <i class="fas fa-chart-pie text-lg"></i>
            <span class="text-[9px] font-bold uppercase">Assets</span>
        </button>
        <button class="text-gray-500 flex flex-col items-center gap-1">
            <i class="fas fa-shield-alt text-lg"></i>
            <span class="text-[9px] font-bold uppercase">Audit</span>
        </button>
        <button class="text-gray-500 flex flex-col items-center gap-1">
            <i class="fas fa-cog text-lg"></i>
            <span class="text-[9px] font-bold uppercase">Settings</span>
        </button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-3 rounded-2xl font-bold text-sm shadow-2xl z-[200] hidden transition-all">
        Action Successful
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const toast = document.getElementById('toast');
        const solInput = document.getElementById('solInput');

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString([], { hour: 12, hour12: false });
            const div = document.createElement('div');
            let color = "text-gray-400";
            if(type === 'success') color = "text-green-400";
            if(type === 'warning') color = "text-yellow-500";
            if(type === 'danger') color = "text-red-500";
            
            div.className = color;
            div.innerHTML = `<span class="opacity-30 mr-2">[${time}]</span> ${msg}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function setSol(val) {
            solInput.value = val === 'MAX' ? 12.45 : val;
        }

        // Phantom Mobile Integration
        const connectBtn = document.getElementById('mobileConnect');
        const walletDisplay = document.getElementById('walletDisplay');
        const addrText = document.getElementById('addrText');

        connectBtn.addEventListener('click', async () => {
            const isPhantom = window.solana && window.solana.isPhantom;
            
            if(!isPhantom) {
                addLog("Gunakan Browser di dalam aplikasi Phantom!", "danger");
                showToast("Buka di Browser Phantom!");
                return;
            }

            try {
                const resp = await window.solana.connect();
                const key = resp.publicKey.toString();
                addrText.innerText = key.slice(0,6) + "..." + key.slice(-6);
                walletDisplay.classList.remove('hidden');
                connectBtn.innerText = "ONLINE";
                connectBtn.classList.remove('bg-yellow-500');
                connectBtn.classList.add('bg-green-500');
                addLog("Wallet Terhubung: " + key, "success");
                showToast("Connected!");
            } catch (err) {
                addLog("Koneksi Gagal: " + err.message, "danger");
            }
        });

        // Audit & Snipe Simulation
        document.getElementById('btnAudit').addEventListener('click', () => {
            const ca = document.getElementById('caInput').value;
            if(!ca) return showToast("Masukkan CA!");
            
            addLog("Menganalisis Kontrak Target...", "warning");
            setTimeout(() => {
                document.getElementById('auditResult').classList.remove('hidden');
                addLog("Audit Selesai: Koin Lolos Verifikasi Titan.", "success");
            }, 1000);
        });

        document.getElementById('btnSnipe').addEventListener('click', () => {
            const val = solInput.value;
            addLog(`Mengirim Jito Bundle: ${val} SOL...`, "warning");
            setTimeout(() => {
                addLog(`Dikonfirmasi! Profit Target 2x Diaktifkan.`, "success");
                showToast("Snipe Successful!");
            }, 1500);
        });

        document.getElementById('clearLog').addEventListener('click', () => {
            terminal.innerHTML = '<div class="text-gray-500">> Log cleared.</div>';
        });

    </script>
</body>
</html>
